events {}
http {
  server {
    listen 10000;
    location / {
      proxy_pass http://localhost:9091;
      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "*";
      if ($request_method = OPTIONS) {
        return 204;
      }
    }
  }
}
