<script>
var GURL = localStorage.getItem('pgUrl') || 'https://it-dashboard-sgkf.onrender.com';
var allAlerts = [];
var serverData = [];
var BAT = "@echo off\nsetlocal\ntitle IT Command Agent Setup\ncolor 0A\nset PORT=9182\nset VER=0.31.6\nset DIR=C:\\ITAgent\nset MSI=%DIR%\\agent.msi\nset URL=https://github.com/prometheus-community/windows_exporter/releases/download/v%VER%/windows_exporter-%VER%-amd64.msi\ncls\necho IT Command Agent Setup - Noor Capital\necho =======================================\nnet session >nul 2>&1\nif %errorLevel% neq 0 (echo ERROR: Run as Administrator & pause & exit /b 1)\nif not exist \"%DIR%\" mkdir \"%DIR%\"\necho [1/5] Downloading...\npowershell -NoProfile -ExecutionPolicy Bypass -Command \"(New-Object Net.WebClient).DownloadFile('%URL%','%MSI%')\"\nif not exist \"%MSI%\" (echo ERROR: Download failed & pause & exit /b 1)\necho [2/5] Installing...\nmsiexec /i \"%MSI%\" /quiet /norestart ENABLED_COLLECTORS=\"cpu,cs,logical_disk,memory,net,os,service,system\" LISTEN_PORT=%PORT%\ntimeout /t 4 /nobreak >nul\necho [3/5] Fixing service...\nreg add \"HKLM\\SYSTEM\\CurrentControlSet\\Services\\windows_exporter\" /v ImagePath /t REG_EXPAND_SZ /d \"\\\"C:\\Program Files\\windows_exporter\\windows_exporter.exe\\\" --web.listen-address=:%PORT%\" /f >nul 2>&1\nnet stop windows_exporter >nul 2>&1\ntimeout /t 2 /nobreak >nul\nnet start windows_exporter >nul 2>&1\ntimeout /t 3 /nobreak >nul\necho [4/5] Firewall...\nnetsh advfirewall firewall add rule name=\"IT Command Agent\" dir=in action=allow protocol=TCP localport=%PORT% >nul 2>&1\necho [5/5] Getting IP...\nfor /f \"tokens=2 delims=:\" %%a in ('ipconfig ^| findstr /c:\"IPv4 Address\"') do (set IP=%%a & goto done)\n:done\nset IP=%IP: =%\ncls\necho Setup Complete!\necho Computer: %COMPUTERNAME%\necho IP: %IP%\necho Metrics: http://%IP%:%PORT%/metrics\npause";

var VIEWS = ['dashboard','servers','alerts','agent','settings'];
var TITLES = {dashboard:'Dashboard',servers:'Servers',alerts:'Alerts',agent:'Agent Installer',settings:'Settings'};

function switchView(v,el){
  VIEWS.forEach(function(id){
    var e=document.getElementById('view-'+id);
    if(e) e.style.display='none';
  });
  var t=document.getElementById('view-'+v);
  if(t) t.style.display='';
  document.getElementById('page-title').textContent=TITLES[v]||v;
  document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active');});
  if(el) el.classList.add('active');
  if(v==='agent') renderReg();
}

function saveUrl(){
  GURL=document.getElementById('prom-url-inp').value.trim();
  localStorage.setItem('pgUrl',GURL);
  fetchAll();
}

function clr(p){return p>85?'#f87171':p>65?'#fbbf24':'#4ade80';}

function bar(p){
  return '<div style="display:flex;align-items:center;gap:6px"><div class="btrack" style="width:55px"><div class="bfill" style="width:'+p+'%;background:'+clr(p)+'"></div></div>'+p+'%</div>';
}

async function fetchAll(){
  try {
    var r = await fetch(GURL+'/api/v1/metrics');
    if(!r.ok) throw new Error('HTTP '+r.status);
    var text = await r.text();

    var servers = {};

    // First pass — collect all metrics
    text.split('\n').forEach(function(line){
      if(!line || line.startsWith('#')) return;
      var match = line.match(/^(\w+)\{([^}]*)\}\s+([\d.eE+\-]+)/);
      if(!match) return;
      var name = match[1];
      var labelStr = match[2];
      var val = parseFloat(match[3]);
      var instMatch = labelStr.match(/instance="([^"]+)"/);
      if(!instMatch) return;
      var inst = instMatch[1];
      if(!servers[inst]) servers[inst]={ip:inst,cpu:null,mem:null,disk:null,up:0};
      if(name==='server_up') servers[inst].up=val;
      if(name==='cpu_usage') servers[inst].cpu=Math.round(val*10)/10;
      if(name==='memory_usage') servers[inst].mem=Math.round(val*10)/10;
      if(name==='disk_usage') servers[inst].disk=Math.round(val*10)/10;
    });

    // Second pass — if server has metrics but server_up=0, mark online
    Object.values(servers).forEach(function(s){
      if(s.cpu!==null && s.up===0) s.up=1;
    });

    serverData = Object.values(servers);
    var upCount = serverData.filter(function(s){return s.up===1;}).length;
    var total = serverData.length;
    var avgCpu=0,avgMem=0,cnt=0;
    allAlerts=[];

    serverData.forEach(function(s){
      if(s.up===1){
        if(s.cpu!==null){avgCpu+=s.cpu;cnt++;}
        if(s.mem!==null) avgMem+=s.mem;
        if(s.cpu>85) allAlerts.push({sev:'Critical',src:s.ip,msg:'CPU at '+s.cpu+'%'});
        if(s.mem>85) allAlerts.push({sev:'Warning',src:s.ip,msg:'Memory at '+s.mem+'%'});
        if(s.disk>90) allAlerts.push({sev:'Warning',src:s.ip,msg:'Disk at '+s.disk+'%'});
      } else {
        allAlerts.push({sev:'Critical',src:s.ip,msg:'Server OFFLINE'});
      }
    });

    var aC=cnt>0?Math.round(avgCpu/cnt):0;
    var aM=cnt>0?Math.round(avgMem/cnt):0;

    document.getElementById('m-servers').textContent=upCount+'/'+total;
    document.getElementById('d-servers').textContent=(total-upCount)+' offline';
    document.getElementById('m-cpu').textContent=aC+'%';
    document.getElementById('b-cpu').style.cssText='width:'+aC+'%;background:'+clr(aC);
    document.getElementById('d-cpu').textContent='Across '+cnt+' servers';
    document.getElementById('m-mem').textContent=aM+'%';
    document.getElementById('b-mem').style.cssText='width:'+aM+'%;background:'+clr(aM);
    document.getElementById('d-mem').textContent='Average memory';
    document.getElementById('m-alerts').textContent=allAlerts.length;
    document.getElementById('d-alerts').textContent=allAlerts.length>0?allAlerts.length+' issues':'All systems normal';
    document.getElementById('alert-badge').textContent=allAlerts.length;
    document.getElementById('prom-dot').className='si si-g';
    document.getElementById('sidebar-status').textContent='Render live';
    document.getElementById('set-status').textContent='Connected to '+GURL;
    document.getElementById('last-update').textContent='Updated '+new Date().toLocaleTimeString();

    renderTable();
    renderCards();
    renderAlerts();
    renderReg();

  } catch(e){
    document.getElementById('prom-dot').className='si si-r';
    document.getElementById('sidebar-status').textContent='Not connected';
    document.getElementById('set-status').textContent='Cannot reach '+GURL+' - check Render is running';
    document.getElementById('last-update').textContent='Connection failed';
    document.getElementById('servers-table').innerHTML='<tr><td colspan="5" style="text-align:center;color:#475569;padding:20px">Cannot connect to '+GURL+'</td></tr>';
  }
}

function renderTable(){
  var rows=serverData.map(function(s){
    var st=s.up===1?'<span class="badge badge-success">Online</span>':'<span class="badge badge-danger">Offline</span>';
    var cpu=s.cpu!==null?bar(s.cpu):'--';
    var mem=s.mem!==null?bar(s.mem):'--';
    var disk=s.disk!==null?bar(s.disk):'--';
    return '<tr><td>'+s.ip+'</td><td>'+cpu+'</td><td>'+mem+'</td><td>'+disk+'</td><td>'+st+'</td></tr>';
  }).join('');
  document.getElementById('servers-table').innerHTML=rows||'<tr><td colspan="5" style="text-align:center;color:#475569;padding:20px">No servers found — install an agent first</td></tr>';
}

function renderCards(){
  var cards=serverData.map(function(s){
    var cls=s.up===1?(s.cpu>85||s.mem>85?'warn':'up'):'down';
    var body=s.up===1?
      '<div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">'+
      (s.cpu!==null?'<div class="srow"><span class="sname">CPU</span><div class="btrack"><div class="bfill" style="width:'+s.cpu+'%;background:'+clr(s.cpu)+'"></div></div><span class="bval">'+s.cpu+'%</span></div>':'')+
      (s.mem!==null?'<div class="srow"><span class="sname">Memory</span><div class="btrack"><div class="bfill" style="width:'+s.mem+'%;background:'+clr(s.mem)+'"></div></div><span class="bval">'+s.mem+'%</span></div>':'')+
      (s.disk!==null?'<div class="srow"><span class="sname">Disk</span><div class="btrack"><div class="bfill" style="width:'+s.disk+'%;background:'+clr(s.disk)+'"></div></div><span class="bval">'+s.disk+'%</span></div>':'')+
      '</div>':
      '<div style="color:#f87171;font-size:12px;margin-top:10px">Server offline</div>';
    return '<div class="srv-card '+cls+'">'+
      '<div style="display:flex;align-items:center;justify-content:space-between">'+
      '<div style="font-size:13px;font-weight:600;color:#e2e8f0">'+s.ip+'</div>'+
      (s.up===1?'<span class="badge badge-success">Online</span>':'<span class="badge badge-danger">Offline</span>')+
      '</div>'+body+'</div>';
  }).join('');
  document.getElementById('srv-grid').innerHTML=cards||'<div style="color:#475569;padding:20px">No servers — install an agent first</div>';
}

function renderAlerts(){
  document.getElementById('alerts-count').textContent=allAlerts.length+' open';
  document.getElementById('alerts-body').innerHTML=allAlerts.length===0?
    '<div style="color:#475569;font-size:13px;padding:20px 0;text-align:center">All systems normal</div>':
    allAlerts.map(function(a){
      return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1e2d40">'+
        '<span class="badge '+(a.sev==='Critical'?'badge-danger':'badge-warning')+'">'+a.sev+'</span>'+
        '<span style="font-weight:500;color:#e2e8f0;min-width:160px">'+a.src+'</span>'+
        '<span style="color:#94a3b8;font-size:12px">'+a.msg+'</span></div>';
    }).join('');
}

function renderReg(){
  var el=document.getElementById('reg-servers');
  if(!el) return;
  el.innerHTML=serverData.length>0?
    serverData.map(function(s){
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e2d40">'+
        '<div style="font-size:13px;font-weight:500;color:#e2e8f0">'+s.ip+'</div>'+
        (s.up===1?'<span class="badge badge-success">Online</span>':'<span class="badge badge-danger">Offline</span>')+
        '</div>';
    }).join(''):
    '<div style="color:#475569;font-size:13px">No servers registered yet</div>';
}

function downloadAgent(){
  var blob=new Blob([BAT],{type:'application/octet-stream'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ITAgent-Setup.bat';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function sendAI(){
  var inp=document.getElementById('ai-inp');
  var msgs=document.getElementById('ai-msgs');
  var text=inp.value.trim();
  if(!text) return;
  inp.value='';
  msgs.innerHTML+='<div class="msg msg-user">'+text+'</div>';
  msgs.scrollTop=msgs.scrollHeight;
  var t=document.createElement('div');
  t.className='msg msg-ai';t.textContent='Thinking...';
  msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;
  try{
    var summary=serverData.map(function(s){return s.ip+': CPU='+s.cpu+'%, Mem='+s.mem+'%, '+(s.up===1?'Online':'OFFLINE');}).join(' | ');
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system:'IT assistant for Noor Capital. Servers: '+summary+'. Alerts: '+(allAlerts.length>0?allAlerts.map(function(a){return a.src+':'+a.msg;}).join(', '):'None')+'. Be concise.',
        messages:[{role:'user',content:text}]
      })
    });
    var d=await r.json();
    t.textContent=d.content&&d.content[0]?d.content[0].text:'No response';
  }catch(e){t.textContent='AI unavailable.';}
  msgs.scrollTop=msgs.scrollHeight;
}

document.getElementById('prom-url-inp').value=GURL;
fetchAll();
setInterval(fetchAll,15000);
</script>
